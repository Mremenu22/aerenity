<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aerenity - Breathing Exercise App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 600px; padding: 60px 40px; text-align: center; }
        h1 { font-size: 32px; margin-bottom: 12px; color: #667eea; }
        .subtitle { color: #666; font-size: 16px; margin-bottom: 40px; }
        .links { display: flex; flex-direction: column; gap: 12px; margin-bottom: 40px; }
        a { display: inline-block; padding: 14px 28px; background: #667eea; color: white; text-decoration: none; border-radius: 8px; font-weight: 500; }
        a:hover { background: #764ba2; }
        .footer { border-top: 1px solid #eee; padding-top: 20px; color: #999; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Aerenity</h1>
        <p class="subtitle">Breathing exercises for calm and mindfulness</p>
        <div class="links">
            <a href="privacy">Privacy Policy</a>
            <a href="terms">Terms of Service</a>
        </div>
        <div class="footer">
            Developed by Sebastian Houng<br>
            <a href="mailto:sebas.houng@gmail.com" style="color:#667eea;font-weight:normal;padding:0;background:none;">sebas.houng@gmail.com</a>
            <div style="font-family:monospace;font-size:12px;color:#bbb;margin-top:8px;">com.sebastianhoung.aerenity</div>
        </div>
    </div>
</body>
</html>
